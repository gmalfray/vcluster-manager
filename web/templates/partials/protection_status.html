{{define "protection_status.html"}}
{{if .Enabled}}
<div class="flex items-center space-x-4">
    <div class="flex items-center space-x-3">
        <span class="text-sm font-medium text-gray-700">Protection namespace</span>
        <label class="relative inline-flex items-center {{if .User.isAdmin}}cursor-pointer{{else}}cursor-not-allowed{{end}}">
            <input type="checkbox"
                   {{if .Protected}}checked{{end}}
                   {{if not .User.isAdmin}}disabled{{end}}
                   class="sr-only peer"
                   hx-post="/api/vclusters/{{.Name}}/{{if .Protected}}disable{{else}}enable{{end}}-protection?env={{.Env}}"
                   hx-target="closest div[class*='flex items-center space-x-4']"
                   hx-swap="outerHTML"
                   {{if .User.isAdmin}}hx-confirm="{{if .Protected}}Desactiver la protection contre la suppression du namespace ?{{else}}Activer la protection contre la suppression du namespace ?{{end}}"{{end}}>
            <div class="relative w-16 h-8 rounded-full transition-colors duration-200 {{if .Protected}}bg-green-500{{else}}bg-red-500{{end}}">
                <div class="absolute top-1 {{if .Protected}}right-1{{else}}left-1{{end}} w-6 h-6 bg-white rounded-full shadow-md transition-all duration-200 flex items-center justify-center">
                    {{if .Protected}}
                    <svg class="w-4 h-4 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                    </svg>
                    {{else}}
                    <svg class="w-4 h-4 text-red-600" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H7V7a3 3 0 015.905-.75 1 1 0 001.937-.5A5.002 5.002 0 0010 2z"/>
                    </svg>
                    {{end}}
                </div>
            </div>
            <span class="ml-3 text-sm font-medium {{if .Protected}}text-green-700{{else}}text-gray-600{{end}}">
                {{if .Protected}}Active{{else}}Inactive{{end}}
            </span>
        </label>
    </div>
</div>
{{end}}
{{end}}
