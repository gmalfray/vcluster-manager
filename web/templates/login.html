<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vCluster Manager - Connexion</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@500;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="h-full">
    <div class="wf-login-wrap">
        <div class="wf-login-box">
            <!-- Logo -->
            <div class="flex flex-col items-center mb-8">
                <svg width="160" height="48" viewBox="0 0 320 72" xmlns="http://www.w3.org/2000/svg" class="mb-3">
                    <defs>
                        <linearGradient id="wfl" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="50%" stop-color="#22d3ee"/>
                            <stop offset="100%" stop-color="#34d399"/>
                        </linearGradient>
                        <linearGradient id="wflb" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
                            <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.3"/>
                            <stop offset="100%" stop-color="#34d399" stop-opacity="0.3"/>
                        </linearGradient>
                    </defs>
                    <path d="M8,44 C22,30 36,30 50,44 C64,58 78,58 92,44" fill="none" stroke="url(#wflb)" stroke-width="3" stroke-linecap="round"/>
                    <path d="M8,30 C22,14 36,14 50,30 C64,46 78,46 92,30" fill="none" stroke="url(#wfl)" stroke-width="3.5" stroke-linecap="round"/>
                    <path d="M12,22 C24,12 34,12 46,22 C58,32 68,32 80,22" fill="none" stroke="url(#wflb)" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="8" cy="30" r="3.5" fill="#6366f1"/>
                    <circle cx="50" cy="30" r="4" fill="#22d3ee"/>
                    <circle cx="92" cy="30" r="3.5" fill="#34d399"/>
                    <text x="110" y="33" fill="#e8eaf0" font-family="Outfit, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">vCluster</text>
                    <text x="110" y="52" fill="#6b7190" font-family="Outfit, sans-serif" font-size="11.5" font-weight="500" letter-spacing="3">MANAGER</text>
                </svg>
                <p class="text-sm" style="color:var(--text-muted);">Connectez-vous pour continuer</p>
            </div>

            {{if .Error}}
            <div class="wf-alert wf-alert-red mb-6">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor"/></svg>
                <span class="text-sm">{{.Error}}</span>
            </div>
            {{end}}

            <form action="/auth/local/login" method="POST" class="space-y-4">
                <div>
                    <label for="username" class="wf-form-label">Utilisateur</label>
                    <input type="text" name="username" id="username" required autofocus
                        class="wf-form-input mt-1">
                </div>
                <div>
                    <label for="password" class="wf-form-label">Mot de passe</label>
                    <input type="password" name="password" id="password" required
                        class="wf-form-input mt-1">
                </div>
                <button type="submit" class="btn btn-indigo w-full justify-center mt-2">
                    Se connecter
                </button>
            </form>

            {{if .OIDCEnabled}}
            <div class="mt-5 pt-5 text-center" style="border-top:1px solid var(--border-subtle);">
                <a href="/auth/sso" class="text-sm" style="color:var(--indigo);">
                    Se connecter via SSO (Keycloak)
                </a>
            </div>
            {{end}}
        </div>
    </div>
</body>
</html>
