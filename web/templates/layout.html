{{define "layout"}}
<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vCluster Manager - Kosmos</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@500;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css">
</head>

<body class="h-full">
    <div class="min-h-full">
        <nav class="wf-nav">
            <a href="/" class="wf-nav-logo">
                <svg width="130" height="32" viewBox="0 0 200 52" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="wfnav" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="50%" stop-color="#22d3ee"/>
                            <stop offset="100%" stop-color="#34d399"/>
                        </linearGradient>
                    </defs>
                    <path d="M8,30 C22,14 36,14 50,30 C64,46 78,46 92,30" fill="none" stroke="url(#wfnav)" stroke-width="3.5" stroke-linecap="round"/>
                    <circle cx="8"  cy="30" r="3.5" fill="#6366f1"/>
                    <circle cx="50" cy="30" r="4"   fill="#22d3ee"/>
                    <circle cx="92" cy="30" r="3.5" fill="#34d399"/>
                    <text x="102" y="35" fill="#e4e7f0" font-family="Outfit, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.5">vCluster</text>
                </svg>
                <span class="wf-nav-logo-sub">manager</span>
                {{if .Version}}<span style="font-size:10px;color:#6b7280;margin-left:6px;align-self:flex-end;padding-bottom:2px;">{{.Version}}</span>{{end}}
            </a>

            <div class="wf-nav-links">
                <a href="/" class="wf-nav-link">Dashboard</a>
                <a href="/vclusters?env=preprod" class="wf-nav-link">Preprod</a>
                <a href="/vclusters?env=prod" class="wf-nav-link">Prod</a>
                {{if .User.isAdmin}}
                <a href="/vclusters/new" class="wf-nav-cta">
                    <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><line x1="8" y1="2" x2="8" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="2" y1="8" x2="14" y2="8" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
                    Nouveau vCluster
                </a>
                {{end}}
            </div>

            <div class="wf-nav-right">
                {{if .User.isAdmin}}
                <a href="/config" class="wf-nav-config" title="Configuration">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M4 4l1.4 1.4M14.6 14.6L16 16M4 16l1.4-1.4M14.6 5.4L16 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </a>
                {{end}}
                {{if .User.authenticated}}
                <div class="wf-nav-user">
                    <div class="wf-nav-avatar">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke="white" stroke-width="2"/>
                            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="wf-nav-username">{{.User.name}}</span>
                    <a href="/auth/logout" class="wf-nav-logout">Logout</a>
                </div>
                {{end}}
            </div>
        </nav>

        <main class="wf-main">
            <div id="toast-container" style="position:fixed;top:calc(var(--nav-height) + 12px);right:16px;z-index:200;width:360px;max-width:calc(100vw - 32px);"></div>
            {{template "content" .}}
        </main>
    </div>
<!-- Page loading overlay (activated via hx-indicator="#page-loading-overlay") -->
<div id="page-loading-overlay" class="wf-page-loading">
    <svg width="160" height="42" viewBox="0 0 200 52" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="wfloader" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="#6366f1"/>
                <stop offset="50%"  stop-color="#22d3ee"/>
                <stop offset="100%" stop-color="#34d399"/>
            </linearGradient>
        </defs>
        <path d="M8,30 C22,14 36,14 50,30 C64,46 78,46 92,30"
              fill="none" stroke="url(#wfloader)" stroke-width="3.5" stroke-linecap="round"
              stroke-dasharray="15 8"
              class="wf-loader-wave"/>
        <circle cx="8"  cy="30" r="4"   fill="#6366f1" class="wf-loader-dot-1"/>
        <circle cx="50" cy="30" r="4.5" fill="#22d3ee" class="wf-loader-dot-2"/>
        <circle cx="92" cy="30" r="4"   fill="#34d399" class="wf-loader-dot-3"/>
    </svg>
    <span class="wf-page-loading-text" id="page-loading-text">Traitement en cours...</span>
</div>

<script>
(function(){
    var m = document.cookie.match(/(?:^|; )flash=([^;]*)/);
    if (!m) return;
    var val = decodeURIComponent(m[1]);
    var sep = val.indexOf('|');
    if (sep < 0) return;
    var level = val.substring(0, sep);
    var msg = val.substring(sep + 1);
    document.cookie = 'flash=; Path=/; Max-Age=0';
    var tc = document.getElementById('toast-container');
    if (!tc) return;
    var d = document.createElement('div');
    d.className = 'wf-toast wf-toast-' + level + ' mb-2';
    d.innerHTML = '<div class="flex items-start gap-3"><div class="flex-1"><p class="text-sm font-medium" style="color:var(--text);">' + msg.replace(/[<>&]/g, function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];}) + '</p></div><button onclick="this.closest(\'.wf-toast\').remove()" class="text-sm leading-none opacity-60 hover:opacity-100" style="color:var(--text);">&times;</button></div>';
    tc.appendChild(d);
    setTimeout(function(){ if (d.parentNode) d.remove(); }, 5000);
})();

// CSRF: inject the X-CSRF-Token header on every HTMX request (double-submit cookie pattern).
document.addEventListener('htmx:configRequest', function(e) {
    var m = document.cookie.match(/(?:^|; )csrf_token=([^;]*)/);
    if (m) e.detail.headers['X-CSRF-Token'] = decodeURIComponent(m[1]);
});

// Update overlay text from data-loading-text attribute on the triggering element
document.addEventListener('htmx:beforeRequest', function(e) {
    var txt = e.detail.elt.dataset.loadingText;
    if (txt) {
        var el = document.getElementById('page-loading-text');
        if (el) el.textContent = txt;
    }
});
document.addEventListener('htmx:afterRequest', function() {
    var el = document.getElementById('page-loading-text');
    if (el) el.textContent = 'Traitement en cours...';
});
</script>
</body>

</html>
{{end}}
